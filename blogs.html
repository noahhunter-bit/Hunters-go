<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — HuntersGo Missions</title>
  <style>
    /* Basic theme & typography (matches your site) */
    @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+Pro:wght@300;400;600&display=swap');
    :root{--bg:#f7f1e3;--cream:#fdfaf3;--olive:#4c5b47;--accent:#c89a2f;--muted:#6e655b;--shadow:rgba(50,40,30,0.12);--panel:rgba(255,255,250,0.9)}
    [data-theme="dark"]{--bg:#181713;--cream:#211f1c;--olive:#c7d0b6;--accent:#d4ac2e;--muted:#9b9286;--panel:rgba(34,32,29,0.85)}
    html,body{margin:0;background:var(--bg);font-family:"Source Sans Pro",sans-serif;color:var(--olive)}
    .container{max-width:1100px;margin:1.2rem auto;padding:0 1rem}
    header{display:flex;align-items:center;justify-content:space-between;background:var(--cream);padding:.6rem 1.2rem;border-radius:0;box-shadow:0 2px 8px var(--shadow)}
    .logo{display:flex;align-items:center;gap:.6rem}.logo img{width:44px}
    nav ul{display:flex;gap:1rem;list-style:none;margin:0;padding:0}
    nav a{text-decoration:none;color:var(--olive);font-weight:600}
    /* Page header */
    .hero{padding:1.2rem 0}.hero h1{font-family:'Merriweather',serif;margin:0;color:var(--olive)}
    .tabs{display:flex;gap:.6rem;margin:1rem 0;flex-wrap:wrap}
    .tab{padding:.45rem .85rem;border-radius:999px;background:var(--panel);cursor:pointer;border:1px solid rgba(0,0,0,0.04)}
    .tab.active{background:linear-gradient(90deg,var(--accent),#c37b5a);color:white}
    /* Grid of posts */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
    @media(max-width:780px){.grid{grid-template-columns:1fr}}
    .card{background:var(--cream);padding:0;border-radius:10px;box-shadow:0 6px 18px var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .card img{width:100%;height:190px;object-fit:cover;display:block}
    .card-body{padding:0.9rem}
    .meta{font-size:.9rem;color:var(--muted);display:flex;justify-content:space-between;gap:.6rem}
    .title{font-weight:700;color:var(--olive);margin:.45rem 0}
    .excerpt{color:var(--muted);margin-bottom:.6rem}
    .read-link{align-self:flex-start;margin-top:auto;padding:.45rem .6rem;border-radius:8px;background:var(--accent);color:white;text-decoration:none;font-weight:700}
    /* small tag */
    .tag{font-size:.78rem;padding:.2rem .45rem;border-radius:6px;background:rgba(0,0,0,0.04);display:inline-block;color:var(--muted)}
    /* empty state */
    .empty{padding:1.6rem;background:var(--panel);border-radius:10px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><img src="assets/emblem.png" alt=""><div style="font-family:'Merriweather',serif;color:var(--olive);font-weight:700">HuntersGo</div></div>
      <nav><ul><li><a href="index.html">Home</a></li><li><a href="past_trips.html">Past Trips</a></li><li><a href="current_mission.html">Current Mission</a></li><li><a href="support.html">Support</a></li></ul></nav>
    </header>

    <main>
      <section class="hero">
        <h1>Stories from the Field</h1>
        <div style="color:var(--muted);margin-top:.6rem">Updates, reflections, and practical news — organized so you can quickly find missions, fundraising, and events updates.</div>
      </section>

      <div style="margin-top:1rem">
        <div class="tabs" role="tablist" aria-label="Blog categories">
          <button class="tab active" data-tab="missions">Missions</button>
          <button class="tab" data-tab="fundraising">Fundraising</button>
          <button class="tab" data-tab="events">Events</button>
          <button class="tab" data-tab="archive">Archive</button>
        </div>

        <div id="posts-area">
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // helper: parse date string "Month DD, YYYY" -> JS Date
    function parseDateString(s){
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }

    // load JSON and render
    async function loadAndRender(tab='missions'){
      const res = await fetch('data/blogs.json');
      const posts = await res.json();

      // determine archive threshold (180 days)
      const now = new Date();
      const cutoff = new Date(now.getTime() - 180*24*60*60*1000);

      // process posts: compute realCategory (archive override)
      const processed = posts.map(p => {
        const dt = parseDateString(p.date);
        const isOld = dt && dt < cutoff;
        const realCategory = isOld ? 'archive' : (p.category || 'missions');
        return Object.assign({}, p, { _dateObj: dt, _realCategory: realCategory });
      });

      // filter for requested tab and sort descending by date
      const filtered = processed.filter(p => p._realCategory === tab).sort((a,b)=> {
        const ad = a._dateObj? a._dateObj.getTime():0;
        const bd = b._dateObj? b._dateObj.getTime():0;
        return bd - ad;
      });

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if(filtered.length === 0){
        grid.innerHTML = '<div class="empty">No posts in this section yet.</div>';
        return;
      }

      for(const p of filtered){
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          ${p.image? `<img src="${p.image}" alt="${p.title}">` : ''}
          <div class="card-body">
            <div class="meta"><div>${p.date}</div><div class="tag">${p.location||''} · ${p.author||''}</div></div>
            <div class="title">${p.title}</div>
            <div class="excerpt">${p.excerpt || ''}</div>
            <a class="read-link" href="blog.html?id=${encodeURIComponent(p.id)}">Read</a>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    // tab handling
    document.querySelectorAll('.tab').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const t = btn.getAttribute('data-tab');
        loadAndRender(t);
      });
    });

    // initial load
    loadAndRender('missions');
  </script>
</body>
</html>
